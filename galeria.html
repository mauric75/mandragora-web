<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Galeria - Mandragora</title><link rel="icon" type="image/png" href="assets/brand-logos/iso.png"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet"><style>
:root{--c-bg:#f8f4ed;--c-gold:#b8892e;--c-cream:#1a1512;--f-display:"Cormorant Garamond",Georgia,serif;--f-body:"Jost",system-ui,sans-serif}
body{font-family:var(--f-body);color:var(--c-cream);background:var(--c-bg);margin:0}
a{color:inherit;text-decoration:none}h1{font-family:var(--f-display);font-size:3rem;text-align:center;margin:3rem 0 2rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;max-width:1200px;margin:0 auto;padding:0 1rem 4rem}
.grid img{width:100%;aspect-ratio:4/3;object-fit:cover;cursor:pointer;border-radius:2px;transition:transform .3s}
.grid img:hover{transform:scale(1.03)}
.lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.94);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.lightbox.is-open{opacity:1;pointer-events:auto}.lightbox img{max-width:92vw;max-height:90vh}
.lightbox__close{position:absolute;top:1.5rem;right:1.5rem;background:none;border:1px solid rgba(255,255,255,.3);color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.3rem}
</style></head><body>
<a href="index.html" style="position:fixed;top:1.5rem;left:2rem;z-index:100;font-family:var(--f-display);font-size:1.2rem;color:var(--c-gold)">← Mandragora</a>
<h1>Galeria</h1>
<section class="grid"><img src="assets/images/compania.jpg" alt="" loading="lazy"><img src="assets/images/comunidad.jpg" alt="" loading="lazy"><img src="assets/images/escenario.jpg" alt="" loading="lazy"><img src="assets/images/escuela.jpg" alt="" loading="lazy"><img src="assets/images/fachada.jpg" alt="" loading="lazy"><img src="assets/images/festival.jpg" alt="" loading="lazy"><img src="assets/images/hero-mandragora.jpg" alt="" loading="lazy"><img src="assets/images/obra-atrapada.jpg" alt="" loading="lazy"><img src="assets/images/obra-crisis-actor.jpg" alt="" loading="lazy"><img src="assets/images/obra-manos-atadas.jpg" alt="" loading="lazy"><img src="assets/images/sala.jpg" alt="" loading="lazy"></section><div class="lightbox" id="lb"><button class="lightbox__close" id="lb-close">X</button><img src="" alt="" id="lb-img"></div><script>document.querySelectorAll(".grid img").forEach(function(i){i.addEventListener("click",function(){document.getElementById("lb-img").src=i.src;document.getElementById("lb").classList.add("is-open")})});document.getElementById("lb-close").addEventListener("click",function(){document.getElementById("lb").classList.remove("is-open")});document.getElementById("lb").addEventListener("click",function(e){if(e.target===document.getElementById("lb"))document.getElementById("lb").classList.remove("is-open")})</script></body></html>
