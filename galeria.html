<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Galeria - Mandragora</title><link rel="icon" type="image/png" href="assets/brand-logos/iso.png"><script>(function(){var t=localStorage.getItem("mandragora-theme");if(t==="dark")document.documentElement.setAttribute("data-theme","dark");})()</script><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--c-bg:#f8f4ed;--c-gold:#b8892e;--c-cream:#1a1512;--c-dim:rgba(26,21,18,0.65);--c-border:rgba(26,21,18,0.07);--f-display:"Cormorant Garamond",Georgia,serif;--f-mark:"Cinzel",Georgia,serif;--f-body:"Jost",system-ui,sans-serif;--gutter:clamp(1.5rem,5vw,5rem);--ease:cubic-bezier(0.22,1,0.36,1)}
[data-theme="dark"]{--c-bg:#05070a;--c-gold:#CE9A47;--c-cream:#f3ece0;--c-dim:rgba(243,236,224,0.65);--c-border:rgba(243,236,224,0.07)}
body{font-family:var(--f-body);color:var(--c-cream);background:var(--c-bg);margin:0;transition:background 0.4s var(--ease),color 0.3s var(--ease)}a{color:inherit;text-decoration:none}h1{font-family:var(--f-display);font-weight:600}
.site-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.5rem var(--gutter);background:rgba(248,244,237,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);font-family:var(--f-mark);font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--c-cream)}
[data-theme="dark"] .site-nav{background:rgba(5,7,10,0.92)}.site-nav__logo{height:36px;width:auto}.site-nav__links{display:flex;gap:1.5rem;font-family:var(--f-body);letter-spacing:0.08em;font-size:0.74rem}.site-nav__links a{opacity:0.72;transition:opacity 0.3s}.site-nav__links a:hover{opacity:1;color:var(--c-gold)}.theme-toggle{background:none;border:1px solid currentColor;cursor:pointer;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:0.9rem;opacity:0.7;transition:opacity 0.3s,transform 0.4s var(--ease)}.theme-toggle:hover{opacity:1;transform:rotate(15deg)}@media(max-width:900px){.site-nav__links{display:none}}
.page-header{padding:8rem var(--gutter) 2rem;text-align:center}.page-header h1{font-size:clamp(2.6rem,6vw,4.8rem);margin-bottom:0.5rem}.page-header p{color:var(--c-dim);font-size:0.9rem}
.masonry{columns:3 240px;column-gap:0.75rem;max-width:1200px;margin:0 auto;padding:0 var(--gutter) 4rem}.masonry img{width:100%;margin-bottom:0.75rem;border-radius:2px;cursor:pointer;transition:transform 0.4s var(--ease),filter 0.4s;filter:contrast(1.02);display:block}.masonry img:hover{transform:scale(1.02);filter:contrast(1.06)}@media(max-width:600px){.masonry{columns:2 160px}}
.lightbox{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.35s}.lightbox.is-open{opacity:1;pointer-events:auto}.lightbox img{max-width:94vw;max-height:88vh;object-fit:contain;border-radius:2px}.lightbox__close,.lightbox__prev,.lightbox__next{position:absolute;background:none;border:1px solid rgba(255,255,255,0.25);color:#fff;cursor:pointer;display:grid;place-items:center;transition:border-color 0.3s}.lightbox__close:hover,.lightbox__prev:hover,.lightbox__next:hover{border-color:#fff}.lightbox__close{top:1.5rem;right:1.5rem;width:40px;height:40px;border-radius:50%;font-size:1.3rem}.lightbox__prev{left:1rem;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;font-size:1.5rem}.lightbox__next{right:1rem;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;font-size:1.5rem}.lightbox__counter{position:absolute;bottom:1.5rem;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.5);font-size:0.8rem;letter-spacing:0.1em}
.site-footer{padding:3rem var(--gutter) 2rem;text-align:center;border-top:1px solid var(--c-border)}.site-footer__logo{height:40px;width:auto;margin:0 auto 0.5rem;display:block}.site-footer__legal{font-size:0.7rem;color:var(--c-dim);margin-top:1rem}
</style></head><body>
<header class="site-nav"><a href="index.html"><img src="assets/brand-logos/logo-negro.png" alt="Mandragora" class="site-nav__logo"></a><nav class="site-nav__links"><a href="index.html">Inicio</a><a href="escuela.html">Escuela</a><a href="sala.html">Sala</a><a href="compania.html">Compania</a><a href="agenda.html">Agenda</a><a href="contacto.html">Contacto</a></nav><button class="theme-toggle" id="theme-toggle">☀</button></header>
<section class="page-header"><h1>Galeria</h1><p>11 fotos</p></section>
<section class="masonry"><img src="assets/images/compania.jpg" alt="" loading="lazy">
<img src="assets/images/comunidad.jpg" alt="" loading="lazy">
<img src="assets/images/escenario.jpg" alt="" loading="lazy">
<img src="assets/images/escuela.jpg" alt="" loading="lazy">
<img src="assets/images/fachada.jpg" alt="" loading="lazy">
<img src="assets/images/festival.jpg" alt="" loading="lazy">
<img src="assets/images/hero-mandragora.jpg" alt="" loading="lazy">
<img src="assets/images/obra-atrapada.jpg" alt="" loading="lazy">
<img src="assets/images/obra-crisis-actor.jpg" alt="" loading="lazy">
<img src="assets/images/obra-manos-atadas.jpg" alt="" loading="lazy">
<img src="assets/images/sala.jpg" alt="" loading="lazy"></section>
<div class="lightbox" id="lb"><button class="lightbox__close" id="lb-close">X</button><button class="lightbox__prev" id="lb-prev">←</button><button class="lightbox__next" id="lb-next">→</button><div class="lightbox__counter" id="lb-counter"></div><img src="" alt="" id="lb-img"></div>
<footer class="site-footer"><img src="assets/brand-logos/logo-negro.png" alt="Mandragora" class="site-footer__logo"><p class="site-footer__legal">© 2026 Mandragora</p></footer>
<script>
(function(){var a=document.querySelectorAll(".masonry img"),l=document.getElementById("lb"),i=document.getElementById("lb-img"),n=0;a.forEach(function(x,p){x.addEventListener("click",function(){n=p;s();l.classList.add("is-open")})});function s(){i.src=a[n].src;document.getElementById("lb-counter").textContent=(n+1)+" de "+a.length}document.getElementById("lb-close").addEventListener("click",function(){l.classList.remove("is-open")});document.getElementById("lb-prev").addEventListener("click",function(){n=n>0?n-1:a.length-1;s()});document.getElementById("lb-next").addEventListener("click",function(){n=n<a.length-1?n+1:0;s()});l.addEventListener("click",function(e){if(e.target===l)l.classList.remove("is-open")});document.addEventListener("keydown",function(e){if(!l.classList.contains("is-open"))return;if(e.key==="Escape")l.classList.remove("is-open");if(e.key==="ArrowLeft"){n=n>0?n-1:a.length-1;s()}if(e.key==="ArrowRight"){n=n<a.length-1?n+1:0;s()}});var t=document.getElementById("theme-toggle"),h=document.documentElement,s=localStorage.getItem("mandragora-theme");if(s==="dark"){h.setAttribute("data-theme","dark");t.textContent="☾"}t.addEventListener("click",function(){var d=h.getAttribute("data-theme")==="dark";if(d){h.removeAttribute("data-theme");t.textContent="☀"}else{h.setAttribute("data-theme","dark");t.textContent="☾"}})})();
</script>
</body></html>
