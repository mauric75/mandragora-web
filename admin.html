<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Mandrágora</title>
<style>
:root { --c-bg:#f8f4ed; --c-cream:#1a1512; --c-gold:#b8892e; --c-red:#c0432a; }
body { background:var(--c-bg); color:var(--c-cream); font-family:system-ui,sans-serif; margin:0; padding:2rem; }
h1 { font-size:1.5rem; margin-bottom:1.5rem; }
.login { max-width:400px; margin:4rem auto; text-align:center; }
.login input { width:100%; padding:0.8rem; margin:0.5rem 0; border:1px solid #ddd; border-radius:4px; font-size:1rem; }
.login button { width:100%; padding:0.8rem; background:var(--c-gold); color:#fff; border:none; border-radius:4px; font-size:1rem; cursor:pointer; }
.login button:disabled { opacity:0.6; cursor:wait; }
table { width:100%; border-collapse:collapse; margin-top:1rem; }
th,td { padding:0.6rem; text-align:left; border-bottom:1px solid #ddd; font-size:0.9rem; }
th { font-weight:600; color:var(--c-gold); text-transform:uppercase; letter-spacing:0.05em; font-size:0.75rem; }
.actions { margin-bottom:1rem; display:flex; gap:0.5rem; }
.actions button { padding:0.4em 1em; border-radius:4px; cursor:pointer; border:1px solid #ddd; background:#fff; font-size:0.85rem; }
.actions button.active { background:var(--c-gold); color:#fff; border-color:var(--c-gold); }
.no-data { text-align:center; padding:3rem; opacity:0.5; }
a.back, .button-link { color:var(--c-gold); font-size:0.85rem; }
.button-link { background:none; border:0; cursor:pointer; padding:0; }
.dev-notice { margin:0 0 1rem; padding:0.75rem 1rem; border-left:3px solid var(--c-gold); background:#fff8e8; font-size:0.85rem; }
@keyframes fade-in {
  from { opacity: 0; }
  to   { opacity: 1; }
}
</style>
</head>
<body>
<div class="login" id="login-box">
  <h1>Admin · Mandrágora</h1>
  <input type="password" id="password" placeholder="Contraseña" autofocus>
  <button id="login-btn">Entrar</button>
  <div id="login-msg" role="status" aria-live="polite" style="margin-top:0.5rem;font-size:0.85rem;color:var(--c-red)"></div>
  <a href="index.html" class="back">← Volver al inicio</a>
</div>

<div id="dashboard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
    <h1 style="margin:0">Reservas</h1>
    <button type="button" id="logout-btn" class="button-link">Cerrar sesión</button>
  </div>
  <p class="dev-notice">Las reservas se cargan desde la base central de Mandrágora.</p>
  <p id="dashboard-msg" role="status" aria-live="polite"></p>
  <div class="actions">
    <button class="active" data-filter="all">Todas</button>
    <button data-filter="sala">Sala</button>
    <button data-filter="taller">Talleres</button>
    <button data-filter="entrada">Entradas</button>
    <button data-filter="otro">Consultas</button>
  </div>
  <div id="reservas-table"></div>
  <div class="no-data" id="no-data">No hay reservas todavía.</div>
</div>

<script>
(function(){
  var loginBox = document.getElementById('login-box');
  var dashboard = document.getElementById('dashboard');
  var passwordInput = document.getElementById('password');
  var loginButton = document.getElementById('login-btn');
  var loginMessage = document.getElementById('login-msg');
  var reservas = [];
  var labels = {sala:'Reserva de sala',taller:'Inscripción a taller',entrada:'Entrada',otro:'Consulta'};

  function showLogin(message){
    loginBox.style.display = 'block';
    dashboard.style.display = 'none';
    loginMessage.textContent = message || '';
  }

  async function showDashboard(){
    loginBox.style.display = 'none';
    dashboard.style.display = 'block';
    document.getElementById('dashboard-msg').textContent = 'Cargando reservas…';
    try {
      var response = await fetch('/api/reservas', {credentials:'same-origin', headers:{Accept:'application/json'}});
      if (response.status === 401) {
        showLogin('La sesión expiró.');
        return;
      }
      if (!response.ok) throw new Error('No se pudieron cargar las reservas.');
      var data = await response.json();
      reservas = Array.isArray(data.data) ? data.data : [];
      document.getElementById('dashboard-msg').textContent = '';
      renderReservas('all');
    } catch (error) {
      reservas = [];
      renderReservas('all');
      document.getElementById('dashboard-msg').textContent = error.message;
    }
  }

  function appendCell(row, value){
    var cell = document.createElement('td');
    cell.textContent = value == null ? '' : String(value);
    row.appendChild(cell);
  }

  function renderReservas(filter){
    var filtered = filter === 'all' ? reservas : reservas.filter(function(item){ return item.servicio === filter; });
    var tableContainer = document.getElementById('reservas-table');
    var noData = document.getElementById('no-data');
    tableContainer.replaceChildren();

    if(!filtered.length){
      noData.style.display = 'block';
      return;
    }

    noData.style.display = 'none';
    var table = document.createElement('table');
    var head = document.createElement('thead');
    var headRow = document.createElement('tr');
    ['Fecha','Tipo','Detalle','Nombre','WhatsApp','Email','Mensaje','Estado'].forEach(function(label){
      var cell = document.createElement('th');
      cell.textContent = label;
      headRow.appendChild(cell);
    });
    head.appendChild(headRow);
    table.appendChild(head);

    var body = document.createElement('tbody');
    filtered.forEach(function(item){
      var row = document.createElement('tr');
      appendCell(row, item.fecha ? new Date(item.fecha).toLocaleDateString('es-UY') : '');
      appendCell(row, labels[item.servicio] || item.servicio);
      appendCell(row, item.detalle);
      appendCell(row, item.nombre);
      appendCell(row, item.whatsapp);
      appendCell(row, item.email);
      appendCell(row, item.mensaje);
      appendCell(row, item.estado);
      body.appendChild(row);
    });
    table.appendChild(body);
    tableContainer.appendChild(table);
  }

  async function checkSession(){
    try {
      var response = await fetch('/api/admin-auth', {credentials:'same-origin', headers:{Accept:'application/json'}});
      if(response.ok) showDashboard();
    } catch (error) {
      showLogin('No se pudo conectar con el panel seguro.');
    }
  }

  async function login(){
    loginButton.disabled = true;
    loginMessage.textContent = '';
    try {
      var response = await fetch('/api/admin-auth?action=login', {
        method:'POST',
        credentials:'same-origin',
        headers:{'Content-Type':'application/json', Accept:'application/json'},
        body:JSON.stringify({password:passwordInput.value})
      });
      if(!response.ok){
        var data = await response.json().catch(function(){ return {}; });
        throw new Error(data.error || 'No se pudo iniciar sesión');
      }
      passwordInput.value = '';
      await showDashboard();
    } catch (error) {
      loginMessage.textContent = error.message;
    } finally {
      loginButton.disabled = false;
    }
  }

  async function logout(){
    await fetch('/api/admin-auth?action=logout', {method:'POST', credentials:'same-origin'}).catch(function(){});
    showLogin('Sesión cerrada.');
  }

  loginButton.addEventListener('click', login);
  passwordInput.addEventListener('keydown', function(event){ if(event.key === 'Enter') login(); });
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.querySelectorAll('.actions button').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.actions button').forEach(function(button){button.classList.remove('active');});
      btn.classList.add('active');
      renderReservas(btn.dataset.filter);
    });
  });
  checkSession();
})();
</script>

<div id="ai-chat" style="display:none;max-width:700px;margin:2rem auto 0;padding:1rem;border-top:1px solid var(--c-border)">
  <p style="font-family:var(--f-mark);font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--c-gold);margin-bottom:1rem">Consultá a la IA</p>
  <div id="ai-chat-log" style="max-height:300px;overflow-y:auto;margin-bottom:1rem;font-size:0.9rem;line-height:1.6"></div>
  <div style="display:flex;gap:0.5rem">
    <input type="text" id="ai-input" placeholder="Ej: cuántas reservas hay esta semana?" style="flex:1;padding:0.5em;background:var(--c-bg);border:1px solid var(--c-border);color:var(--c-cream);font-family:inherit;font-size:0.85rem">
    <button id="ai-send" style="background:var(--c-gold);color:var(--c-bg);border:none;padding:0.5em 1em;cursor:pointer;font-family:inherit;font-size:0.8rem">Enviar</button>
  </div>
</div>

<script>
(function(){
  if(!document.getElementById('ai-chat')) return;
  var chatDiv = document.getElementById('ai-chat');
  var log = document.getElementById('ai-chat-log');
  var input = document.getElementById('ai-input');
  var send = document.getElementById('ai-send');

  function addMsg(text, who){
    var div = document.createElement('div');
    div.style.marginBottom = '0.5rem';
    div.innerHTML = '<strong>' + (who === 'user' ? 'Vos' : 'IA') + ':</strong> ' + text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  async function sendMsg(){
    var msg = input.value.trim();
    if(!msg) return;
    addMsg(msg, 'user');
    input.value = '';
    addMsg('Pensando…', 'ia');
    try {
      var r = await fetch('/api/ai-admin/chat', {
        method:'POST', credentials:'same-origin',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({message:msg})
      });
      var data = await r.json();
      log.lastChild.innerHTML = '<strong>IA:</strong> ' + (data.reply || 'Sin respuesta');
    } catch(e) {
      log.lastChild.innerHTML = '<strong>IA:</strong> Error de conexión';
    }
  }

  send.addEventListener('click', sendMsg);
  input.addEventListener('keydown', function(e){ if(e.key === 'Enter') sendMsg(); });

  // Show chat after dashboard is visible
  var check = setInterval(function(){
    if(document.getElementById('dashboard').style.display !== 'none'){
      chatDiv.style.display = 'block';
      clearInterval(check);
    }
  }, 500);
})();
</script>

</body>
</html>
